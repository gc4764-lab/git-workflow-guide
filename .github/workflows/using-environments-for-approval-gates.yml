name: Deploy with Approvals

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: app
          path: dist/
  
  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    environment: staging  # No approval needed, but has its own secrets
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app
          path: dist/
      - run: |
          echo "Deploying to staging..."
          # Uses staging-specific secrets
          curl -X POST https://staging.example.com/deploy \
            -H "Authorization: Bearer ${{ secrets.STAGING_API_KEY }}"
  
  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: 
      name: production
      url: https://example.com  # Shows URL in GitHub UI
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app
          path: dist/
      - run: |
          echo "Deploying to production..."
          # Requires manual approval if configured in environment settings
          curl -X POST https://api.example.com/deploy \
            -H "Authorization: Bearer ${{ secrets.PRODUCTION_API_KEY }}"