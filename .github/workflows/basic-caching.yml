name: Fast CI with Caching

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'  # Automatically caches npm dependencies
      
      - run: npm ci  # Will use cache if available
      - run: npm run build
      - run: npm test