name: Split Tests

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Split tests into 4 parallel groups
        shard: [1, 2, 3, 4]
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      
      - run: npm ci
      
      # Run only tests that belong to this shard
      - name: Run tests for shard ${{ matrix.shard }}
        run: npm test -- --shard=${{ matrix.shard }}/4