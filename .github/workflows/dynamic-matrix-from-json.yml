jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          # Generate matrix dynamically (example: get changed files)
          CHANGED_FILES=$(git diff --name-only HEAD~1)
          echo "matrix=$(echo "$CHANGED_FILES" | jq -R -s -c 'split("\n")[:-1]')" >> $GITHUB_OUTPUT
  
  process:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        file: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - run: echo "Processing ${{ matrix.file }}"