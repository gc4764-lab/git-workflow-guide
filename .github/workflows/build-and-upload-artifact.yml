name: Build and Upload Artifact

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build application
        run: |
          mkdir dist
          echo "This is my built app" > dist/index.html
          echo "Version: 1.0" > dist/version.txt
      
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app-build
          path: dist/
  
  deploy:
    needs: build  # This job waits for 'build' to complete
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: my-app-build
          path: downloaded-dist
      
      - name: Show downloaded files
        run: ls -la downloaded-dist/
      
      - name: Deploy (example)
        run: echo "Deploying downloaded-dist/ to server..."