# ❌ BAD: Hardcoding secrets
env:
  API_KEY: "abc123-secret-key"

# ✅ GOOD: Using secrets
env:
  API_KEY: ${{ secrets.API_KEY }}

# ❌ BAD: Printing secrets in logs
- run: echo "API key is ${{ secrets.API_KEY }}"

# ✅ GOOD: Masking secrets automatically
# GitHub automatically masks secret values in logs

# ✅ GOOD: Using environments for additional protection
jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment: production  # Requires approval before running
    steps:
      - run: deploy --key ${{ secrets.PROD_API_KEY }}